# /etc/kmscon/kmscon.conf — KMS/DRM system console configuration
#
# See kmscon(1) for all options. Boolean options can be negated with "no-" prefix.

### Graphics
drm
gpus=all
use-original-mode

### Font (freetype via fontconfig)
font-engine=freetype
font-size=18
font-name=monospace

### Input
mouse
xkb-repeat-delay=250
xkb-repeat-rate=50

### Power
# Screen timeout in seconds (0=disable). Server: set 0 to prevent blanking.
dpms-timeout=0

### Terminal
term=kmscon
sb-size=10000

### Session hotkeys
# Ctrl+Super+Return = new session
# Ctrl+Super+Left/Right = switch session
# Ctrl+Super+BackSpace = close session (press twice)
grab-session-next=<Ctrl><Logo>Right
grab-session-prev=<Ctrl><Logo>Left
grab-session-close=<Ctrl><Logo>BackSpace
grab-terminal-new=<Ctrl><Logo>Return

### Reboot shortcut (disabled by default on servers)
#grab-reboot=<Ctrl><Alt>Delete

### Palette (color scheme): base16-dark is easy on eyes
palette=base16-dark
